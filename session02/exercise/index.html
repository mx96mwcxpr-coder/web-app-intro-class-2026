    <!-- ============================================
         実習2: 基本的なHTMLページ
         まずは以下のh1とpを自分の内容に書き換えてみよう
    ============================================ -->
    <header>
    <h1>はじめてのWebページ これから作成します</h1>
    <p>HTMLの勉強を始めました！</p>
    </header>
    
    <form>
    <!-- テキスト入力 -->
    <input type="text" placeholder="名前を入力">

    <!-- メールアドレス入力 -->
    <input type="email" placeholder="example@mail.com">

    <!-- パスワード入力（入力が●で隠れる） -->
    <input type="password" placeholder="パスワード">
    
    <br>

    <!-- チェックボックス -->
    <input type="checkbox" id="task1">
    <label for="task1">タスク1を完了</label>

    <input type="checkbox" id="task2" checked>
    <label for="task2">タスク2を完了（初期状態でチェック済み）</label>
    
    <br>

    <!-- for属性でinputのidを指定 -->
    <label for="username">名前:</label>
    <input type="text" id="username">

    <!-- label で input を囲む方法もある -->
    <label>
    メール:
    <input type="email">
    </label>

    <br>

    <!-- 通常のボタン -->
    <button type="button">クリック</button>

    <!-- 送信ボタン（form内で使用） -->
    <button type="submit">送信</button>

    </form>
